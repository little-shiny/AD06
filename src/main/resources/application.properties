# ============================================
# CONFIGURACIÓN DE LA APLICACIÓN SPRING BOOT
# ============================================

# Puerto de escucha del servidor
server.port = 8080

# ============================================
# CONEXIÓN CON LA BASE DE DATOS MySQL
# ============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Formato: jdbc:mysql://localhost:3306/Cine
# Pista: La base de datos se llama "Cine"
spring.datasource.url = jdbc:mysql://localhost:3306/Cine


spring.datasource.username = root


spring.datasource.password = 1234

# ============================================
# CONFIGURACIÓN DE HIBERNATE/JPA
# ============================================

# Mostrar las consultas SQL en consola (útil para depuración)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de MySQL
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL5InnoDBDialect

# ddl-auto: update = actualiza el esquema sin borrar datos
spring.jpa.hibernate.ddl-auto=update

# Respetar mayúsculas y minúsculas en nombres de tablas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Nombre de la aplicación
aplicacion.nombre=Gestión de Cine - Directores y Películas
