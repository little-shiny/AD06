<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Lista de Directores</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div class="container">
        <h1>📋 Lista de Directores</h1>
        
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Año Nacimiento</th>
                    <th>Editar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="director : ${directores}">
                    <td>
                        <a th:href="@{/director/{id}(id=${director.idDirector})}">
                            <span th:text="${director.idDirector}">ID</span>
                        </a>
                    </td>

                    <td th:text="${director.nombre}">Nombre</td>

                    <td th:text="${director.anyoNacimiento}">Año</td>

                    <td>
                        <a th:href="@{/director/update/{id}(id=${director.idDirector})}">✏️ Editar</a>
                    </td>
                    <td>
                        <a th:href="@{/director/delete/{id}(id=${director.idDirector})}">🗑️ Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="actions">
            <a th:href="@{/director/add}" class="btn">➕ Añadir Director</a>
            <a th:href="@{/}" class="btn">🏠 Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
