<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Lista de Películas</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div class="container">
        <h1>🎥 Lista de Películas</h1>
        
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Año</th>
                    <th>Director</th>
                    <th>Editar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pelicula : ${peliculas}">
                    <td th:text="${pelicula.idPelicula}">ID</td>
                    <td th:text="${pelicula.titulo}">Título</td>
                    <td th:text="${pelicula.anyo}">Año</td>
                    <td th:text="${pelicula.director?.nombre} ?: 'Sin director'">Director</td>
                    <td>
                        <a th:href="@{/pelicula/update/{id}(id=${pelicula.idPelicula})}">✏️</a>
                    </td>
                    <td>
                        <a th:href="@{/pelicula/delete/{id}(id=${pelicula.idPelicula})}">🗑️</a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="actions">
            <a th:href="@{/pelicula/add}" class="btn">➕ Añadir Película</a>
            <a th:href="@{/}" class="btn">🏠 Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
