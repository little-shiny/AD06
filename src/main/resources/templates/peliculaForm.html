<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title th:text="${nuevo} ? 'Alta de Película' : 'Modificar Película'">Formulario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div class="container">
        <h1 th:text="${nuevo} ? '➕ Alta de Película' : '✏️ Modificar Película'">Formulario</h1>
        
        <!-- TODO 47: Completar th:action y th:object del formulario de película -->
        <!-- Pista: th:action="@{/pelicula/save}" th:object="${pelicula}" -->
        
        <form method="POST">
            <table>
                <tr th:if="*{idPelicula}">
                    <td><label>ID:</label></td>
                    <td><input type="text" th:field="*{idPelicula}" readonly /></td>
                </tr>
                <tr>
                    <td><label>Título:</label></td>
                    <!-- TODO 48: Vincular el campo título con th:field="*{titulo}" -->
                    <td><input type="text" required /></td>
                </tr>
                <tr>
                    <td><label>Año:</label></td>
                    <!-- TODO 49: Vincular el campo año con th:field="*{anyo}" -->
                    <td><input type="number" required /></td>
                </tr>
                <tr>
                    <td><label>Director:</label></td>
                    <td>
                        <!-- TODO 50: Crear selector de director con th:field y th:each -->
                        <!-- Pista: <select th:field="*{director}"> -->
                        <!--        <option th:each="dir : ${directores}" th:value="${dir}" th:text="${dir.nombre}"> -->
                        <select>
                            <option value="">-- Sin director --</option>
                            <option>Director</option>
                        </select>
                    </td>
                </tr>
            </table>
            
            <input type="submit" th:value="${nuevo} ? 'Guardar' : 'Modificar'" class="btn" />
        </form>
        
        <div class="actions">
            <a th:href="@{/pelicula}" class="btn">🎥 Volver a la lista</a>
        </div>
    </div>
</body>
</html>
