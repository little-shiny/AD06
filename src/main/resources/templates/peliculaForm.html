<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title th:text="${nuevo} ? 'Alta de Película' : 'Modificar Película'">Formulario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div class="container">
        <h1 th:text="${nuevo} ? '➕ Alta de Película' : '✏️ Modificar Película'">Formulario</h1>
        
        <form th:action="@{/pelicula/save}" th:object="${pelicula}" method="POST">
            <table>
                <tr th:if="*{idPelicula}">
                    <td><label>ID:</label></td>
                    <td><input type="text" th:field="*{idPelicula}" readonly /></td>
                </tr>
                <tr>
                    <td><label>Título:</label></td>
                    <td><input type="text" th:field="*{titulo}" required /></td>
                </tr>
                <tr>
                    <td><label>Año:</label></td>
                    <td>    <input type="number" th:field="*{anyo}" required /></td>
                </tr>
                <tr>
                    <td><label>Director:</label></td>
                    <td>
                        <select th:field="*{director}">
                            <option value="">-- Sin director --</option>
                            <option th:each="dir : ${directores}"
                                    th:value="${dir}"
                                    th:text="${dir.nombre}">Director</option>
                        </select>
                    </td>
                </tr>
            </table>
            
            <input type="submit" th:value="${nuevo} ? 'Guardar' : 'Modificar'" class="btn" />
        </form>
        
        <div class="actions">
            <a th:href="@{/pelicula}" class="btn">🎥 Volver a la lista</a>
        </div>
    </div>
</body>
</html>
