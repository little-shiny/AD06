<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title th:text="${nuevo} ? 'Alta de Director' : 'Modificar Director'">Formulario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
    <div class="container">
        <h1 th:text="${nuevo} ? '➕ Alta de Director' : '✏️ Modificar Director'">Formulario</h1>

        <form th:action="@{/director/save}" th:object="${director}" method="POST">

            <table>
                <!-- Mostrar ID solo si es modificación (no es nuevo) -->
                <tr th:if="*{idDirector}">
                    <td><label>ID:<input type="text" th:field="*{idDirector}" readonly /></label></td>
                </tr>
                <tr>
                    <td><label>Nombre:<input type="text" th:field="*{nombre}" required /></label></td>
                </tr>
                <tr>
                    <td><label>Año Nacimiento:<input type="number" th:field="*{anyoNacimiento}" required /></label></td>
                </tr>
            </table>
            
            <!-- Botón con texto dinámico según sea alta o modificación -->
            <input type="submit" th:value="${nuevo} ? 'Guardar' : 'Modificar'" class="btn" />
        </form>
        
        <div class="actions">
            <a th:href="@{/director}" class="btn">📋 Volver a la lista</a>
        </div>
    </div>
</body>
</html>
